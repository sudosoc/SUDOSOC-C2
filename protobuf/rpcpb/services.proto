syntax = "proto3";
package rpcpb;
option go_package = "github.com/sudosoc/SUDOSOC-C2/protobuf/rpcpb";

import "commonpb/common.proto";
import "sudosocpb/sudosoc.proto";
import "clientpb/client.proto";

service CoreRPC {

  // *** Version ***
  rpc GetVersion(commonpb.Empty) returns (clientpb.Version);

  // *** Client Logs ***
  rpc ClientLog(stream clientpb.ClientLogData) returns (commonpb.Empty);

  // *** Operator Commands ***
  rpc GetOperators(commonpb.Empty) returns (clientpb.Operators);

  // *** Generic ***
  rpc Kill(sudosocpb.KillReq) returns (commonpb.Empty);
  rpc Reconfigure(sudosocpb.ReconfigureReq) returns (sudosocpb.Reconfigure);
  rpc Rename(clientpb.RenameReq) returns (commonpb.Empty);

  // *** Sessions ***
  rpc GetSessions(commonpb.Empty) returns (clientpb.Sessions);

  // ***Threat monitoring ***
  rpc MonitorStart(commonpb.Empty) returns (commonpb.Response);
  rpc MonitorStop(commonpb.Empty) returns (commonpb.Empty);
  rpc MonitorListConfig(commonpb.Empty) returns (clientpb.MonitoringProviders);
  rpc MonitorAddConfig(clientpb.MonitoringProvider) returns (commonpb.Response);
  rpc MonitorDelConfig(clientpb.MonitoringProvider) returns (commonpb.Response);

  // *** AI ***
  rpc GetAIProviders(commonpb.Empty) returns (clientpb.AIProviderConfigs);
  rpc GetAIConversations(commonpb.Empty) returns (clientpb.AIConversations);
  rpc GetAIConversation(clientpb.AIConversationReq) returns (clientpb.AIConversation);
  rpc SaveAIConversation(clientpb.AIConversation) returns (clientpb.AIConversation);
  rpc DeleteAIConversation(clientpb.AIConversationReq) returns (commonpb.Empty);
  rpc GetAIConversationMessages(clientpb.AIConversationReq)
      returns (clientpb.AIConversationMessages);
  rpc SaveAIConversationMessage(clientpb.AIConversationMessage)
      returns (clientpb.AIConversationMessage);
    
  // *** Listeners ***
  rpc StartMTLSListener(clientpb.MTLSListenerReq) returns (clientpb.ListenerJob);
  rpc StartWGListener(clientpb.WGListenerReq) returns (clientpb.ListenerJob);
  rpc StartDNSListener(clientpb.DNSListenerReq) returns (clientpb.ListenerJob);
  rpc StartHTTPSListener(clientpb.HTTPListenerReq) returns (clientpb.ListenerJob);
  rpc StartHTTPListener(clientpb.HTTPListenerReq) returns (clientpb.ListenerJob);
  
  // *** Beacons ***
  rpc GetBeacons(commonpb.Empty) returns (clientpb.Beacons);
  rpc GetBeacon(clientpb.Beacon) returns (clientpb.Beacon);
  rpc RmBeacon(clientpb.Beacon) returns (commonpb.Empty);
  rpc GetBeaconTasks(clientpb.Beacon) returns (clientpb.BeaconTasks);
  rpc GetBeaconTaskContent(clientpb.BeaconTask) returns (clientpb.BeaconTask);
  rpc CancelBeaconTask(clientpb.BeaconTask) returns (clientpb.BeaconTask);
  rpc UpdateBeaconIntegrityInformation(clientpb.BeaconIntegrity) returns (commonpb.Empty);


  // *** Jobs ***
  rpc GetJobs(commonpb.Empty) returns (clientpb.Jobs);
  rpc KillJob(clientpb.KillJobReq) returns (clientpb.KillJob);
  rpc RestartJobs(clientpb.RestartJobReq) returns (commonpb.Empty);


  // *** Stager Listener ***
  rpc StartTCPStagerListener(clientpb.StagerListenerReq)
      returns (clientpb.StagerListener);

  // *** Loot ***
  rpc LootAdd(clientpb.Loot) returns (clientpb.Loot);
  rpc LootRm(clientpb.Loot) returns (commonpb.Empty);
  rpc LootUpdate(clientpb.Loot) returns (clientpb.Loot);
  rpc LootContent(clientpb.Loot) returns (clientpb.Loot);
  rpc LootAll(commonpb.Empty) returns (clientpb.AllLoot);

  // *** Creds ***
  rpc Creds(commonpb.Empty) returns (clientpb.Credentials);
  rpc CredsAdd(clientpb.Credentials) returns (commonpb.Empty);
  rpc CredsRm(clientpb.Credentials) returns (commonpb.Empty);
  rpc CredsUpdate(clientpb.Credentials) returns (commonpb.Empty);
  rpc GetCredByID(clientpb.Credential) returns (clientpb.Credential);
  rpc GetCredsByHashType(clientpb.Credential) returns (clientpb.Credentials);
  rpc GetPlaintextCredsByHashType(clientpb.Credential)
      returns (clientpb.Credentials);
  rpc CredsSniffHashType(clientpb.Credential) returns (clientpb.Credential);

  // *** Hosts ***
  rpc Hosts(commonpb.Empty) returns (clientpb.AllHosts);
  rpc Host(clientpb.Host) returns (clientpb.Host);
  rpc HostRm(clientpb.Host) returns (commonpb.Empty);
  rpc HostIOCRm(clientpb.IOC) returns (commonpb.Empty);

  // *** Implants ***
  rpc Generate(clientpb.GenerateReq) returns (clientpb.Generate);
  rpc GenerateSpoofMetadata(clientpb.GenerateSpoofMetadataReq)
      returns (commonpb.Empty);
  rpc GenerateExternal(clientpb.ExternalGenerateReq)
      returns (clientpb.ExternalImplantConfig);
  rpc GenerateExternalSaveBuild(clientpb.ExternalImplantBinary)
      returns (commonpb.Empty);
  rpc GenerateExternalGetBuildConfig(clientpb.ImplantBuild)
      returns (clientpb.ExternalImplantConfig);
  rpc GenerateStage(clientpb.GenerateStageReq)
      returns (clientpb.Generate);
  rpc StageImplantBuild(clientpb.ImplantStageReq)
      returns (commonpb.Empty);

  // *** HTTP C2 Profiles ***
  rpc GetHTTPC2Profiles(commonpb.Empty) returns (clientpb.HTTPC2Configs);
  rpc GetHTTPC2ProfileByName(clientpb.C2ProfileReq) returns (clientpb.HTTPC2Config);
  rpc SaveHTTPC2Profile(clientpb.HTTPC2ConfigReq) returns (commonpb.Empty);

  // *** Builders ***
  rpc BuilderRegister(clientpb.Builder) returns (stream clientpb.Event);
  rpc BuilderTrigger(clientpb.Event) returns (commonpb.Empty);
  rpc Builders(commonpb.Empty) returns (clientpb.Builders);

  // *** Certificates ***
  rpc GetCertificateInfo(clientpb.CertificatesReq) returns (clientpb.CertificateInfo);
  rpc GetCertificateAuthorityInfo(commonpb.Empty)
      returns (clientpb.CertificateAuthorityInfo);

  // *** Crackstation ***
  rpc Crack(clientpb.CrackCommand) returns (clientpb.CrackResponse);
  rpc CrackstationRegister(clientpb.Crackstation)
      returns (stream clientpb.Event);
  rpc CrackstationTrigger(clientpb.Event) returns (commonpb.Empty);
  rpc CrackstationBenchmark(clientpb.CrackBenchmark) returns (commonpb.Empty);
  rpc Crackstations(commonpb.Empty) returns (clientpb.Crackstations);
  rpc CrackTaskByID(clientpb.CrackTask) returns (clientpb.CrackTask);
  rpc CrackTaskUpdate(clientpb.CrackTask) returns (commonpb.Empty);
  rpc CrackFilesList(clientpb.CrackFile) returns (clientpb.CrackFiles);
  rpc CrackFileCreate(clientpb.CrackFile) returns (clientpb.CrackFile);
  rpc CrackFileChunkUpload(clientpb.CrackFileChunk) returns (commonpb.Empty);
  rpc CrackFileChunkDownload(clientpb.CrackFileChunk)
      returns (clientpb.CrackFileChunk);
  rpc CrackFileComplete(clientpb.CrackFile) returns (commonpb.Empty);
  rpc CrackFileDelete(clientpb.CrackFile) returns (commonpb.Empty);

  // *** Payloads ***
  rpc Regenerate(clientpb.RegenerateReq) returns (clientpb.Generate);
  rpc ImplantBuilds(commonpb.Empty) returns (clientpb.ImplantBuilds);
  rpc DeleteImplantBuild(clientpb.DeleteReq) returns (commonpb.Empty);
  rpc Canaries(commonpb.Empty) returns (clientpb.Canaries);
  rpc GenerateWGClientConfig(commonpb.Empty) returns (clientpb.WGClientConfig);
  rpc GenerateUniqueIP(commonpb.Empty) returns (clientpb.UniqueWGIP);
  rpc ImplantProfiles(commonpb.Empty) returns (clientpb.ImplantProfiles);
  rpc DeleteImplantProfile(clientpb.DeleteReq) returns (commonpb.Empty);
  rpc SaveImplantProfile(clientpb.ImplantProfile)
      returns (clientpb.ImplantProfile);
  rpc ShellcodeRDI(clientpb.ShellcodeRDIReq) returns (clientpb.ShellcodeRDI);
  rpc GetCompiler(commonpb.Empty) returns (clientpb.Compiler);
  rpc ShellcodeEncoder(clientpb.ShellcodeEncodeReq)
      returns (clientpb.ShellcodeEncode);
  rpc ShellcodeEncoderMap(commonpb.Empty)
      returns (clientpb.ShellcodeEncoderMap);
  rpc TrafficEncoderMap(commonpb.Empty) returns (clientpb.TrafficEncoderMap);
  rpc TrafficEncoderAdd(clientpb.TrafficEncoder)
      returns (clientpb.TrafficEncoderTests);
  rpc TrafficEncoderRm(clientpb.TrafficEncoder) returns (commonpb.Empty);

  // *** Websites ***
  rpc Websites(commonpb.Empty) returns (clientpb.Websites);
  rpc Website(clientpb.Website) returns (clientpb.Website);
  rpc WebsiteRemove(clientpb.Website) returns (commonpb.Empty);
  rpc WebsiteAddContent(clientpb.WebsiteAddContent) returns (clientpb.Website);
  rpc WebsiteUpdateContent(clientpb.WebsiteAddContent)
      returns (clientpb.Website);
  rpc WebsiteRemoveContent(clientpb.WebsiteRemoveContent)
      returns (clientpb.Website);

  // *** Session Interactions ***
  rpc Ping(sudosocpb.Ping) returns (sudosocpb.Ping);
  rpc Ps(sudosocpb.PsReq) returns (sudosocpb.Ps);
  rpc Terminate(sudosocpb.TerminateReq) returns (sudosocpb.Terminate);
  rpc Ifconfig(sudosocpb.IfconfigReq) returns (sudosocpb.Ifconfig);
  rpc Netstat(sudosocpb.NetstatReq) returns (sudosocpb.Netstat);
  rpc Ls(sudosocpb.LsReq) returns (sudosocpb.Ls);
  rpc Cd(sudosocpb.CdReq) returns (sudosocpb.Pwd);
  rpc Pwd(sudosocpb.PwdReq) returns (sudosocpb.Pwd);
  rpc Mv(sudosocpb.MvReq) returns (sudosocpb.Mv);
  rpc Cp(sudosocpb.CpReq) returns (sudosocpb.Cp);
  rpc Rm(sudosocpb.RmReq) returns (sudosocpb.Rm);
  rpc Mkdir(sudosocpb.MkdirReq) returns (sudosocpb.Mkdir);
  rpc Download(sudosocpb.DownloadReq) returns (sudosocpb.Download);
  rpc Upload(sudosocpb.UploadReq) returns (sudosocpb.Upload);
  rpc Grep(sudosocpb.GrepReq) returns (sudosocpb.Grep);
  rpc Chmod(sudosocpb.ChmodReq) returns (sudosocpb.Chmod);
  rpc Chown(sudosocpb.ChownReq) returns (sudosocpb.Chown);
  rpc Chtimes(sudosocpb.ChtimesReq) returns (sudosocpb.Chtimes);
  rpc MemfilesList(sudosocpb.MemfilesListReq) returns (sudosocpb.Ls);
  rpc MemfilesAdd(sudosocpb.MemfilesAddReq) returns (sudosocpb.MemfilesAdd);
  rpc MemfilesRm(sudosocpb.MemfilesRmReq) returns (sudosocpb.MemfilesRm);
  rpc Mount(sudosocpb.MountReq) returns (sudosocpb.Mount);
  rpc ProcessDump(sudosocpb.ProcessDumpReq) returns (sudosocpb.ProcessDump);
  rpc RunAs(sudosocpb.RunAsReq) returns (sudosocpb.RunAs);
  rpc Impersonate(sudosocpb.ImpersonateReq) returns (sudosocpb.Impersonate);
  rpc RevToSelf(sudosocpb.RevToSelfReq) returns (sudosocpb.RevToSelf);
  rpc GetSystem(clientpb.GetSystemReq) returns (sudosocpb.GetSystem);
  rpc Task(sudosocpb.TaskReq) returns (sudosocpb.Task);
  rpc Msf(clientpb.MSFReq) returns (sudosocpb.Task);
  rpc MsfRemote(clientpb.MSFRemoteReq) returns (sudosocpb.Task);
  rpc ExecuteAssembly(sudosocpb.ExecuteAssemblyReq)
      returns (sudosocpb.ExecuteAssembly);
  rpc Migrate(clientpb.MigrateReq) returns (sudosocpb.Migrate);
  rpc Execute(sudosocpb.ExecuteReq) returns (sudosocpb.Execute);
  rpc ExecuteWindows(sudosocpb.ExecuteWindowsReq) returns (sudosocpb.Execute);
  rpc ExecuteChildren(sudosocpb.ExecuteChildrenReq) returns (sudosocpb.ExecuteChildren);
  rpc Sideload(sudosocpb.SideloadReq) returns (sudosocpb.Sideload);
  rpc SpawnDll(sudosocpb.InvokeSpawnDllReq) returns (sudosocpb.SpawnDll);
  rpc Screenshot(sudosocpb.ScreenshotReq) returns (sudosocpb.Screenshot);
  rpc CurrentTokenOwner(sudosocpb.CurrentTokenOwnerReq)
      returns (sudosocpb.CurrentTokenOwner);
  rpc Services(sudosocpb.ServicesReq) returns (sudosocpb.Services);
  rpc ServiceDetail(sudosocpb.ServiceDetailReq) returns (sudosocpb.ServiceDetail);
  rpc StartServiceByName(sudosocpb.StartServiceByNameReq) returns (sudosocpb.ServiceInfo);

  // *** Pivots ***
  rpc PivotStartListener(sudosocpb.PivotStartListenerReq)
      returns (sudosocpb.PivotListener);
  rpc PivotStopListener(sudosocpb.PivotStopListenerReq) returns (commonpb.Empty);
  rpc PivotSessionListeners(sudosocpb.PivotListenersReq)
      returns (sudosocpb.PivotListeners);
  rpc PivotGraph(commonpb.Empty) returns (clientpb.PivotGraph);

  rpc StartService(sudosocpb.StartServiceReq) returns (sudosocpb.ServiceInfo);
  rpc StopService(sudosocpb.StopServiceReq) returns (sudosocpb.ServiceInfo);
  rpc RemoveService(sudosocpb.RemoveServiceReq) returns (sudosocpb.ServiceInfo);

  rpc MakeToken(sudosocpb.MakeTokenReq) returns (sudosocpb.MakeToken);
  rpc GetEnv(sudosocpb.EnvReq) returns (sudosocpb.EnvInfo);
  rpc SetEnv(sudosocpb.SetEnvReq) returns (sudosocpb.SetEnv);
  rpc UnsetEnv(sudosocpb.UnsetEnvReq) returns (sudosocpb.UnsetEnv);
  rpc Backdoor(clientpb.BackdoorReq) returns (clientpb.Backdoor);
  rpc RegistryRead(sudosocpb.RegistryReadReq) returns (sudosocpb.RegistryRead);
  rpc RegistryWrite(sudosocpb.RegistryWriteReq) returns (sudosocpb.RegistryWrite);
  rpc RegistryCreateKey(sudosocpb.RegistryCreateKeyReq)
      returns (sudosocpb.RegistryCreateKey);
  rpc RegistryDeleteKey(sudosocpb.RegistryDeleteKeyReq)
      returns (sudosocpb.RegistryDeleteKey);
  rpc RegistryListSubKeys(sudosocpb.RegistrySubKeyListReq)
      returns (sudosocpb.RegistrySubKeyList);
  rpc RegistryListValues(sudosocpb.RegistryListValuesReq)
      returns (sudosocpb.RegistryValuesList);
  rpc RegistryReadHive(sudosocpb.RegistryReadHiveReq) returns (sudosocpb.RegistryReadHive);
  rpc RunSSHCommand(sudosocpb.SSHCommandReq) returns (sudosocpb.SSHCommand);
  rpc HijackDLL(clientpb.DllHijackReq) returns (clientpb.DllHijack);
  rpc GetPrivs(sudosocpb.GetPrivsReq) returns (sudosocpb.GetPrivs);
  rpc StartRportFwdListener(sudosocpb.RportFwdStartListenerReq)
      returns (sudosocpb.RportFwdListener);
  rpc GetRportFwdListeners(sudosocpb.RportFwdListenersReq)
      returns (sudosocpb.RportFwdListeners);
  rpc StopRportFwdListener(sudosocpb.RportFwdStopListenerReq)
      returns (sudosocpb.RportFwdListener);

  // *** Beacon *** -only commands
  rpc OpenSession(sudosocpb.OpenSession) returns (sudosocpb.OpenSession);
  rpc CloseSession(sudosocpb.CloseSession) returns (commonpb.Empty);

  // *** Extensions ***
  rpc RegisterExtension(sudosocpb.RegisterExtensionReq)
      returns (sudosocpb.RegisterExtension);
  rpc CallExtension(sudosocpb.CallExtensionReq) returns (sudosocpb.CallExtension);
  rpc ListExtensions(sudosocpb.ListExtensionsReq)
      returns (sudosocpb.ListExtensions);

  // *** Wasm Extensions ***
  rpc RegisterWasmExtension(sudosocpb.RegisterWasmExtensionReq)
      returns (sudosocpb.RegisterWasmExtension);
  rpc ListWasmExtensions(sudosocpb.ListWasmExtensionsReq)
      returns (sudosocpb.ListWasmExtensions);
  rpc ExecWasmExtension(sudosocpb.ExecWasmExtensionReq)
      returns (sudosocpb.ExecWasmExtension);

  // *** Wireguard Specific ***
  rpc WGStartPortForward(sudosocpb.WGPortForwardStartReq)
      returns (sudosocpb.WGPortForward);
  rpc WGStopPortForward(sudosocpb.WGPortForwardStopReq)
      returns (sudosocpb.WGPortForward);
  rpc WGStartSocks(sudosocpb.WGSocksStartReq) returns (sudosocpb.WGSocks);
  rpc WGStopSocks(sudosocpb.WGSocksStopReq) returns (sudosocpb.WGSocks);
  rpc WGListForwarders(sudosocpb.WGTCPForwardersReq)
      returns (sudosocpb.WGTCPForwarders);
  rpc WGListSocksServers(sudosocpb.WGSocksServersReq)
      returns (sudosocpb.WGSocksServers);

  // *** Realtime Commands ***
  rpc Shell(sudosocpb.ShellReq) returns (sudosocpb.Shell);
  rpc ShellResize(sudosocpb.ShellResizeReq) returns (commonpb.Empty);
  rpc Portfwd(sudosocpb.PortfwdReq) returns (sudosocpb.Portfwd);

  // *** Socks5 ***
  rpc CreateSocks(sudosocpb.Socks) returns (sudosocpb.Socks);
  rpc CloseSocks(sudosocpb.Socks) returns (commonpb.Empty);
  rpc SocksProxy(stream sudosocpb.SocksData) returns (stream sudosocpb.SocksData);

  // *** Tunnels ***
  rpc CreateTunnel(sudosocpb.Tunnel) returns (sudosocpb.Tunnel);
  rpc CloseTunnel(sudosocpb.Tunnel) returns (commonpb.Empty);
  rpc TunnelData(stream sudosocpb.TunnelData)
      returns (stream sudosocpb.TunnelData);

  // *** Events ***
  rpc Events(commonpb.Empty) returns (stream clientpb.Event);
}
