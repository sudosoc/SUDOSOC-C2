<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SUDOSOC-C2</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:#0a0a0f;color:#e0e0e0;font-family:'JetBrains Mono',monospace;
         display:flex;flex-direction:column;align-items:center;justify-content:center;
         min-height:100vh;gap:2rem}
    pre{color:#00ff88;font-size:.65rem;line-height:1.3}
    .msg{color:#888;font-size:.85rem;text-align:center;line-height:1.8}
    code{background:#1a1a2e;color:#00d4ff;padding:2px 8px;border-radius:4px;border:1px solid #333}
    .spinner{width:28px;height:28px;border:2px solid #333;border-top-color:#00ff88;
             border-radius:50%;animation:spin .8s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
  <pre>
SUDOSOC-C2
  </pre>
  <p class="msg">
    Web UI not built yet.<br/>
    Run: <code>make ui</code> then <code>make server-only</code>
  </p>
  <div class="spinner"></div>
  <div id="root"></div>
</body>
</html>
